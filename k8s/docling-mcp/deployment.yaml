apiVersion: apps/v1
kind: Deployment
metadata:
  name: docling-mcp
  namespace: docling-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docling-mcp
  template:
    metadata:
      labels:
        app: docling-mcp
    spec:
      containers:
        - name: docling-mcp
          image: localhost:32000/docling-mcp:1.3.5
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: UVICORN_WORKERS
              value: "2"
            - name: UVICORN_THREADS
              value: "4"
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          volumeMounts:
            - name: docling-cache
              mountPath: /root/.cache/docling
      volumes:
        - name: docling-cache
          persistentVolumeClaim:
            claimName: docling-models
---
apiVersion: v1
kind: Service
metadata:
  name: docling-mcp
  namespace: docling-mcp
spec:
  type: NodePort
  selector:
    app: docling-mcp
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30501
