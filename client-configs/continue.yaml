mcpServers:
  - name: searxng
    command: node
    args:
      - /home/komedi/workspace/llm-web-search-mcp/searxng-mcp/dist/index.js
    env:
      SEARXNG_URL: http://localhost:30888
      DOCLING_URL: http://localhost:30501/mcp
      BRAVE_API_KEY: "<your-brave-api-key>"
      TAVILY_API_KEY: "<your-tavily-api-key>"
  - name: google-workspace
    command: uvx
    args:
      - workspace-mcp
      - --tools
      - gmail
      - drive
      - calendar
      - docs
      - sheets
      - slides
      - forms
      - chat
      - tasks
      - contacts
    env:
      GOOGLE_OAUTH_CLIENT_ID: "<your-client-id>"
      GOOGLE_OAUTH_CLIENT_SECRET: "<your-client-secret>"
