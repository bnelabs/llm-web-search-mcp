use_default_settings: true

general:
  instance_name: "searxng-mcp"

search:
  safe_search: 0
  autocomplete: ""
  default_lang: ""
  formats:
    - html
    - json
  max_page: 0

server:
  secret_key: "60adef70cf462bb0f8fffeb1f138c9ed9e3c01f0a90249d18253e1260ac42a12"
  limiter: false
  public_instance: false
  image_proxy: false

# Global HTTP timeouts. Engines may override with their own `timeout:`.
# Relaxed from the previous 4s to accommodate Tor-routed engines (Google,
# Bing, DuckDuckGo), which can take 5–15s per circuit.
outgoing:
  request_timeout: 10.0
  max_request_timeout: 20.0

ui:
  static_use_hash: true

# Coverage strategy: run a broad set of INDEPENDENT general engines in
# parallel so no single one carries all the homelab's single-IP traffic.
# Google and DuckDuckGo still participate, but they're no longer load-bearing
# — if either gets CAPTCHA'd (it happens to any automated use, sooner or
# later), the aggregated result stays healthy from the other six.
#
# Banned/unreliable sources are disabled: brave (aggressive rate limits),
# karmasearch (permanent 403), startpage (uses Google upstream so shares its
# CAPTCHA fate; redundant), baidu/360search (poor English results and hostile
# to non-CN IPs), yandex (politically-scoped & unstable), aol/ask (low
# quality).
engines:
  # --- General web, independent crawlers or permissive APIs ---
  # Google/Bing/DDG routed through the in-cluster Tor SOCKS proxy so the
  # homelab egress IP never hits these upstreams directly — avoids the
  # CAPTCHA/soft-block escalation that eventually catches any scraping
  # aggregator on a single IP. Timeout is raised to 15s because Tor
  # circuits add 5–10s of latency.
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false
    timeout: 15.0
    proxies:
      all://: socks5h://tor:9050

  - name: google
    engine: google
    shortcut: g
    disabled: false
    timeout: 15.0
    proxies:
      all://: socks5h://tor:9050

  - name: bing
    engine: bing
    shortcut: b
    disabled: false
    timeout: 15.0
    proxies:
      all://: socks5h://tor:9050

  - name: qwant
    engine: qwant
    shortcut: qw
    disabled: false

  - name: mojeek
    engine: mojeek
    shortcut: mjk
    disabled: false

  # yep (api.yep.com 400 Bad Request in current SearXNG) and mwmbl (parser
  # IndexError in current SearXNG) are broken upstream; force them off so
  # they don't spam logs or burn the engine timeout budget.
  - name: yep
    engine: yep
    shortcut: yep
    disabled: true
  - name: yep images
    engine: yep
    shortcut: yepi
    disabled: true
  - name: yep news
    engine: yep
    shortcut: yepn
    disabled: true
  - name: mwmbl
