use_default_settings: true

general:
  instance_name: "searxng-mcp"

search:
  safe_search: 0
  formats:
    - html
    - json

server:
  secret_key: "<generate with: openssl rand -hex 32>"
  limiter: false
  public_instance: false
  image_proxy: false

ui:
  static_use_hash: true

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false
  - name: brave
    engine: brave
    shortcut: br
    disabled: false
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false
  - name: stackoverflow
    engine: stackoverflow
    shortcut: so
    disabled: false
  - name: github
    engine: github
    shortcut: gh
    disabled: false
  - name: arxiv
    engine: arxiv
    shortcut: ax
    disabled: false
