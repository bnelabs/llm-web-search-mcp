apiVersion: apps/v1
kind: Deployment
metadata:
  name: docling-mcp
  namespace: docling-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docling-mcp
  template:
    metadata:
      labels:
        app: docling-mcp
    spec:
      containers:
        - name: docling-mcp
          image: localhost:32000/docling-mcp:1.5.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            # 1 worker so the whole thread pool goes to the in-flight request.
            - name: UVICORN_WORKERS
              value: "1"
            - name: UVICORN_THREADS
              value: "4"
            # Torch / BLAS thread tuning (i9-12900KF has 24 threads; leave some for system).
            - name: OMP_NUM_THREADS
              value: "16"
            - name: MKL_NUM_THREADS
              value: "16"
            - name: TOKENIZERS_PARALLELISM
              value: "true"
            # Speedup wrapper knobs (see docling-speedup.py).
            - name: DOCLING_NUM_THREADS
              value: "16"
            - name: DOCLING_DO_OCR
              value: "false"
            - name: DOCLING_FAST_LAYOUT
              value: "true"
            # Keep the HF cache on the PVC so pod restarts don't re-download
            # ~420 MB of weights from Hugging Face every time.
            - name: HF_HOME
              value: "/root/.cache/docling/hf"
          resources:
            requests:
              memory: "2Gi"
              cpu: "2000m"
            limits:
              memory: "16Gi"
              cpu: "20000m"
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          volumeMounts:
            - name: docling-cache
              mountPath: /root/.cache/docling
      volumes:
        - name: docling-cache
          persistentVolumeClaim:
            claimName: docling-models
---
apiVersion: v1
kind: Service
metadata:
  name: docling-mcp
  namespace: docling-mcp
spec:
  type: NodePort
  selector:
    app: docling-mcp
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30501
