use_default_settings: true

general:
  instance_name: "searxng-mcp"

search:
  safe_search: 0
  formats:
    - html
    - json

server:
  secret_key: "60adef70cf462bb0f8fffeb1f138c9ed9e3c01f0a90249d18253e1260ac42a12"
  limiter: false
  public_instance: false
  image_proxy: false

ui:
  static_use_hash: true

# Engine selection: drop sources that actively rate-limit a single-IP
# homelab. `brave` throttles aggressively via `SearxEngineTooManyRequests`;
# `karmasearch` (pulled in by use_default_settings) returns 403 constantly.
# DuckDuckGo is our primary general-web source because it's the most
# permissive for single-IP automated use. Google is kept as a secondary;
# Wikipedia / Stackoverflow / GitHub / arxiv are topical and don't rate-limit.
engines:
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false
  - name: google
    engine: google
    shortcut: g
    disabled: false
  - name: brave
    engine: brave
    shortcut: br
    disabled: true
  - name: karmasearch
    engine: karmasearch
    shortcut: ka
    disabled: true
  - name: karmasearch videos
    engine: karmasearch
    shortcut: kav
    disabled: true
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false
  - name: stackoverflow
    engine: stackoverflow
    shortcut: so
    disabled: false
  - name: github
    engine: github
    shortcut: gh
    disabled: false
  - name: arxiv
    engine: arxiv
    shortcut: ax
    disabled: false
