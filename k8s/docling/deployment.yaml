apiVersion: apps/v1
kind: Deployment
metadata:
  name: docling-serve
  namespace: docling
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docling-serve
  template:
    metadata:
      labels:
        app: docling-serve
    spec:
      containers:
        - name: docling-serve
          image: quay.io/docling-project/docling-serve-cu128:latest
          ports:
            - containerPort: 5001
          env:
            - name: UVICORN_WORKERS
              value: "1"
            - name: DOCLING_NUM_THREADS
              value: "4"
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"
              nvidia.com/gpu: "1"
            limits:
              memory: "8Gi"
              cpu: "2000m"
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 60
            periodSeconds: 60
            timeoutSeconds: 10
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: docling-serve
  namespace: docling
spec:
  type: NodePort
  selector:
    app: docling-serve
  ports:
    - port: 5001
      targetPort: 5001
      nodePort: 30501
